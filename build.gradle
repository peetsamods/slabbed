plugins {
    id 'net.fabricmc.fabric-loom' version '1.15.5'
    id 'maven-publish'
}

loom {
    splitEnvironmentSourceSets()
    runs {
        client {
            vmArgs "-Dmixin.debug=true", "-Dmixin.verbose=true", "-Dmixin.dumpTargetOnFailure=true", "-Dslabbed.debug.sbsb=true"
        }
    }
}

fabricApi {
    configureTests {
        createSourceSet = true
    }
}

version = project.mod_version
group = project.maven_group

base {
    archivesName = project.archives_base_name
}

repositories {
    maven {
        name = "Fabric"
        url = "https://maven.fabricmc.net/"
    }
    mavenCentral()
}

dependencies {
    // To change the versions see the gradle.properties file
    minecraft "com.mojang:minecraft:${project.minecraft_version}"
    implementation "net.fabricmc:fabric-loader:${project.loader_version}"

    // Fabric API. This is technically optional, but you probably want it anyway.
    implementation "net.fabricmc.fabric-api:fabric-api:${project.fabric_version}"
    // Client-only modules for the client source set when splitEnvironmentSourceSets is enabled.
    implementation "net.fabricmc.fabric-api:fabric-api:${project.fabric_version}"
    implementation "net.fabricmc.fabric-api:fabric-renderer-api-v1:${project.fabric_version}"
    implementation "net.fabricmc.fabric-api:fabric-model-loading-api-v1:${project.fabric_version}"

    // fabric-gametest-api-v1 is included in fabric-api bundle (already on main classpath,
    // extended to the gametest source set by configureTests { createSourceSet = true })
}

processResources {
    inputs.property "version", project.version

    filesMatching("fabric.mod.json") {
        expand "version": project.version
    }
}

tasks.withType(JavaCompile).configureEach {
    it.options.release = 21
}

java {
    // Loom will automatically attach sourcesJar to a RemapSourcesJar task and to the "build" task
    // if it's present.
    // If you remove this line, sources will not be generated.
    withSourcesJar()

    sourceCompatibility = JavaVersion.VERSION_21
    targetCompatibility = JavaVersion.VERSION_21
}

tasks.named("sourcesJar", Jar).configure {
    // Keep generated release source artifacts aligned with the public runtime jar.
    exclude("com/slabbed/dev/**")
    exclude("com/slabbed/debug/**")
    exclude("com/slabbed/client/debug/**")
    exclude("com/slabbed/mixin/debug/**")
    exclude("com/slabbed/util/SlabbedDebug.java")
    exclude("com/slabbed/util/RuntimeDiagnostics.java")
    exclude("com/slabbed/util/SlabbedAuditBridge.java")
    exclude("com/slabbed/util/DebugTraceContext.java")
    exclude("slabbed.debug.mixins.json")
}

// 26.1.2 port: Countered Terrain Slabs compat is now Mojang-mapped and compiles (dual mod-id gate).
sourceSets {
    main {
        java {
            exclude("com/slabbed/util/Beta4ManualLiveTrace.java")
            // 26.1.2 port: recorder diagnostics deferred until core compile is restored.
            exclude("com/slabbed/util/Beta35LiveTorchCaptureRecorder.java")
            exclude("com/slabbed/util/Beta35SlabHeightHitAcceptanceRecorder.java")
            exclude("com/slabbed/util/Beta4PlacementAuthorRecorder.java")
            exclude("com/slabbed/mixin/debug/**")
        }
    }
    client {
        java {
            exclude("com/slabbed/mixin/client/Beta4ManualLiveClientTickTraceMixin.java")
            exclude("com/slabbed/mixin/client/Beta4ManualLiveInteractionTraceMixin.java")
            // 26.1.2 port: dev-only client diagnostics are deferred from release compile.
            exclude("com/slabbed/client/GapFillerOverlay.java")
            exclude("com/slabbed/client/ScreenshotCaptureService.java")
            exclude("com/slabbed/client/debug/**")
        }
    }
    gametest {
        java {
            // 26.1.2 port: the legacy SlabbedLab gametests are Yarn-named and do NOT compile
            // under Mojang mappings, so they stay deferred. Compile ONLY the focused,
            // Mojang-named regression tests that are kept current.
            include("com/slabbed/test/GhostLoweredCollisionProofTest.java")
            include("com/slabbed/test/Slabbed2612LoweringContractTest.java")
            include("com/slabbed/test/Slabbed2612DyFingerprintTest.java")
            include("com/slabbed/test/Slabbed2612UseOnPlacementTest.java")
            include("com/slabbed/test/Slabbed2612RestingDyTest.java")
            include("com/slabbed/test/Slabbed2612ConnectorSurvivalTest.java")
            include("com/slabbed/test/Slabbed2612CollisionDepthTest.java")
            include("com/slabbed/test/Slabbed2612CompoundMatrixTest.java")
        }
    }
}

jar {
    from("LICENSE") {
        rename { "${it}_${project.base.archivesName.get()}"}
    }

    // Exclude dev-only and debug-only content from public release jar
    exclude("com/slabbed/dev/**")
    exclude("com/slabbed/debug/**")
    exclude("com/slabbed/client/debug/**")
    exclude("com/slabbed/mixin/debug/**")
    exclude("com/slabbed/util/DebugTraceContext.class")
    exclude("com/slabbed/client/GapFillerOverlay.class")
    exclude("com/slabbed/client/ScreenshotCaptureContext*.class")
    exclude("com/slabbed/client/ScreenshotCaptureService*.class")
    exclude("com/slabbed/client/DyFingerprintDump*.class")
    exclude("com/slabbed/client/CaptureProfile.class")
    exclude("com/slabbed/util/SlabbedDebug.class")
    exclude("com/slabbed/util/Beta4PlacementAuthorRecorder.class")
    exclude("com/slabbed/util/SlabbedAuditBridge.class")
    exclude("slabbed.debug.mixins.json")
}

// configure the maven publication
publishing {
    publications {
        create("mavenJava", MavenPublication) {
            artifactId = project.archives_base_name
            from components.java
        }
    }

    // See https://docs.gradle.org/current/userguide/publishing_maven.html for information on how to set up publishing.
    repositories {
        // Add repositories to publish to here.
        // Notice: This block does NOT have the same function as the block in the top level.
        // The repositories here will be used for publishing your artifact, not for
        // fetching dependencies.
    }
}

// 26.1.2 port: diagnostic recorder cluster is deferred until core Slabbed compiles.
sourceSets {
    main {
        java {
            exclude 'com/slabbed/util/RuntimeDiagnostics.java'
            exclude 'com/slabbed/util/Beta35FenceWallLiveInspectRecorder.java'
            exclude 'com/slabbed/util/Beta35SlabJumpSourceTruthRecorder.java'
            exclude 'com/slabbed/util/DebugTraceContext.java'
        }
    }
}

// 26.1.2 port: audit bridge is deferred until core Slabbed compiles.
sourceSets {
    main {
        java {
            exclude 'com/slabbed/util/SlabbedAuditBridge.java'
        }
    }
}

// 26.1.2 port: dev/audit tooling is deferred from core compileJava until core Slabbed compiles.
sourceSets.main.java.exclude('com/slabbed/dev/**')
