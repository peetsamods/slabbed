plugins {
    id 'fabric-loom' version '1.14-SNAPSHOT'
    id 'maven-publish'
}

loom {
    splitEnvironmentSourceSets()
    runs {
        client {
            vmArgs "-Dmixin.debug=true", "-Dmixin.verbose=true", "-Dmixin.dumpTargetOnFailure=true", "-Dslabbed.debug.sbsb=true"
        }
    }
}

fabricApi {
    configureTests {
        createSourceSet = true
    }
}

sourceSets {
    gametest {
        java {
            // Explicit deferred-client-proof split for MC 1.21.1:
            // keep client proof classes present in-tree, but compile only the
            // two server-compatible classes in this source set.
            setIncludes([
                    "com/slabbed/test/ChainSurvivalReproTest.java",
                    "com/slabbed/test/SlabbedLabFixtureTest.java",
                    "com/slabbed/test/Mc1211GoblinRouteCanaryGameTest.java",
                    "com/slabbed/test/Mc1211GoblinRouteClientEntrypoint.java",
                    "com/slabbed/test/OffsetRaycastTargetingTest.java",
                    "com/slabbed/test/TerrainSlabsTestShim.java",
                    "com/slabbed/test/TerrainSlabsCompatTest.java"
            ])
        }
    }
}

version = project.mod_version
group = project.maven_group

base {
    archivesName = project.archives_base_name
}

repositories {
    maven {
        name = "Fabric"
        url = "https://maven.fabricmc.net/"
    }
    mavenCentral()
}

dependencies {
    // To change the versions see the gradle.properties file
    minecraft "com.mojang:minecraft:${project.minecraft_version}"
    mappings "net.fabricmc:yarn:${project.yarn_mappings}:v2"
    modImplementation "net.fabricmc:fabric-loader:${project.loader_version}"

    // Fabric API. This is technically optional, but you probably want it anyway.
    modImplementation "net.fabricmc.fabric-api:fabric-api:${project.fabric_version}"
    // Client-only modules for the client source set when splitEnvironmentSourceSets is enabled.
    modClientImplementation "net.fabricmc.fabric-api:fabric-api:${project.fabric_version}"
    modClientImplementation "net.fabricmc.fabric-api:fabric-renderer-api-v1:${project.fabric_version}"
    modClientImplementation "net.fabricmc.fabric-api:fabric-model-loading-api-v1:${project.fabric_version}"

    // fabric-gametest-api-v1 is included in fabric-api bundle (already on main classpath,
    // extended to the gametest source set by configureTests { createSourceSet = true })

    // ── Terrain Slabs compat live-testing (optional, auto-detected) ───────────
    // To live-test the named-surface direct-support compat, drop a 1.21.1-compatible
    // Terrain Slabs jar (Fabric mod id "terrain_slabs") + its Architectury dependency into
    // run/mods/, then `./gradlew runClient`. Absent these jars this block is inert and the
    // build/tests are unaffected (the compat path returns NONE without the mod loaded).
    // NOT loaded into the headless SERVER gametest (runGameTest): Terrain Slabs has client
    // entrypoints that abort a dedicated-server run. The CLIENT harness (runClientGameTest)
    // and runClient DO load it (they're real clients) — needed e.g. by the screenshot
    // showcase route. So skip the wiring only for a server gametest task ("gametest" without
    // "client").
    def slabbedRunningServerGameTest = gradle.startParameter.taskNames.any {
        def t = it.toLowerCase()
        t.contains("gametest") && !t.contains("client")
    }
    if (!slabbedRunningServerGameTest) {
        fileTree(dir: "${projectDir}/run/mods", include: ["*terrain*slab*.jar", "*architectury*.jar", "*midnightlib*.jar"]).each { jar ->
            modLocalRuntime files(jar)
        }
    }
}

processResources {
    inputs.property "version", project.version

    filesMatching("fabric.mod.json") {
        expand "version": project.version
    }
}

tasks.withType(JavaCompile).configureEach {
    it.options.release = 21
}

java {
    // Loom will automatically attach sourcesJar to a RemapSourcesJar task and to the "build" task
    // if it's present.
    // If you remove this line, sources will not be generated.
    withSourcesJar()

    sourceCompatibility = JavaVersion.VERSION_21
    targetCompatibility = JavaVersion.VERSION_21
}

def slabbedForwardedRunPropertyArgs = {
    System.properties.findAll { key, value ->
        key instanceof String
                && value != null
                && (key.startsWith("slabbed.mc1211.")
                || key == "slabbed.bsfb.live.trace")
    }.collect { key, value -> "-D${key}=${value}" }
}

tasks.withType(JavaExec).configureEach {
    doFirst {
        jvmArgs slabbedForwardedRunPropertyArgs()
    }
}

jar {
    from("LICENSE") {
        rename { "${it}_${project.base.archivesName.get()}"}
    }

    // Exclude dev-only and debug-only content from public release jar
    exclude("com/slabbed/dev/**")
    exclude("com/slabbed/debug/**")
    exclude("com/slabbed/client/debug/**")
    exclude("com/slabbed/mixin/debug/**")
    exclude("com/slabbed/util/DebugTraceContext.class")
    exclude("com/slabbed/client/GapFillerOverlay.class")
    exclude("com/slabbed/client/ScreenshotCaptureContext*.class")
    exclude("com/slabbed/client/ScreenshotCaptureService*.class")
    exclude("com/slabbed/client/CaptureProfile.class")
    exclude("com/slabbed/util/SlabbedDebug.class")
    exclude("com/slabbed/util/Beta4PlacementAuthorRecorder.class")
    exclude("com/slabbed/util/SlabbedAuditBridge.class")
    exclude("slabbed.debug.mixins.json")
}

// configure the maven publication
publishing {
    publications {
        create("mavenJava", MavenPublication) {
            artifactId = project.archives_base_name
            from components.java
        }
    }

    // See https://docs.gradle.org/current/userguide/publishing_maven.html for information on how to set up publishing.
    repositories {
        // Add repositories to publish to here.
        // Notice: This block does NOT have the same function as the block in the top level.
        // The repositories here will be used for publishing your artifact, not for
        // fetching dependencies.
    }
}
