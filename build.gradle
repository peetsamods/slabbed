plugins {
    id 'fabric-loom' version '1.14-SNAPSHOT'
    id 'maven-publish'
}

loom {
    splitEnvironmentSourceSets()
    runs {
        client {
            vmArgs "-Dmixin.debug=true", "-Dmixin.verbose=true", "-Dmixin.dumpTargetOnFailure=true", "-Dslabbed.debug.sbsb=true"
        }
    }
}

fabricApi {
    configureTests {
        createSourceSet = true
    }
}

// RELEASE GATE: the maintained automated gate is `./gradlew runGameTest` (headless, 46/46).
// `runClientGameTest` is NOT a release gate — the Slabbed*ClientGameTest harness is unmaintained
// dev-repro scaffolding (red since before the freeze law; tests obsolete/BLOCKED behaviour).
// Do not block a release on runClientGameTest. See RELEASE_GATE.md and HANDOFF.md.

// Forward selected -Dslabbed.* properties from the gradle invocation to the game JVM so e.g.
// `runClient -Dslabbed.targetDyOverlay=true` actually reaches the client.
def slabbedForwardedRunPropertyArgs = {
    System.properties.findAll { key, value ->
        key instanceof String && value != null
                && (key == "slabbed.targetDyOverlay" || key == "slabbed.gapfill")
    }.collect { key, value -> "-D${key}=${value}" }
}
tasks.withType(JavaExec).configureEach {
    doFirst {
        jvmArgs slabbedForwardedRunPropertyArgs()
    }
}

version = project.mod_version
group = project.maven_group

base {
    archivesName = project.archives_base_name
}

repositories {
    maven {
        name = "Fabric"
        url = "https://maven.fabricmc.net/"
    }
    mavenCentral()
}

dependencies {
    def terrainSlabsJar = file("${projectDir}/run/mods/countereds_terrain_slabs-2.2.5.jar")
    def terrainSlabsMidnightLibJar = file("${projectDir}/run/.fabric/processedMods/midnightlib-1.9.2-345c341449172fe2.jar")

    // To change the versions see the gradle.properties file
    minecraft "com.mojang:minecraft:${project.minecraft_version}"
    mappings "net.fabricmc:yarn:${project.yarn_mappings}:v2"
    modImplementation "net.fabricmc:fabric-loader:${project.loader_version}"

    // Fabric API. This is technically optional, but you probably want it anyway.
    modImplementation "net.fabricmc.fabric-api:fabric-api:${project.fabric_version}"
    // Client-only modules for the client source set when splitEnvironmentSourceSets is enabled.
    modClientImplementation "net.fabricmc.fabric-api:fabric-api:${project.fabric_version}"
    modClientImplementation "net.fabricmc.fabric-api:fabric-renderer-api-v1:${project.fabric_version}"
    modClientImplementation "net.fabricmc.fabric-api:fabric-model-loading-api-v1:${project.fabric_version}"

    if (terrainSlabsJar.exists()) {
        modLocalRuntime files(terrainSlabsJar)
    }
    if (terrainSlabsMidnightLibJar.exists()) {
        modLocalRuntime files(terrainSlabsMidnightLibJar)
    }

    // fabric-gametest-api-v1 is included in fabric-api bundle (already on main classpath,
    // extended to the gametest source set by configureTests { createSourceSet = true })
}

processResources {
    inputs.property "version", project.version

    filesMatching("fabric.mod.json") {
        expand "version": project.version
    }
}

tasks.withType(JavaCompile).configureEach {
    it.options.release = 21
}

java {
    // Loom will automatically attach sourcesJar to a RemapSourcesJar task and to the "build" task
    // if it's present.
    // If you remove this line, sources will not be generated.
    withSourcesJar()

    sourceCompatibility = JavaVersion.VERSION_21
    targetCompatibility = JavaVersion.VERSION_21
}

jar {
    from("LICENSE") {
        rename { "${it}_${project.base.archivesName.get()}"}
    }

    // Exclude dev-only and debug-only content from public release jar
    exclude("com/slabbed/dev/**")
    exclude("com/slabbed/debug/**")
    exclude("com/slabbed/client/debug/**")
    exclude("com/slabbed/mixin/debug/**")
    exclude("com/slabbed/client/GapFillerOverlay.class")
    exclude("com/slabbed/client/ScreenshotCaptureContext*.class")
    exclude("com/slabbed/client/ScreenshotCaptureService*.class")
    exclude("com/slabbed/client/CaptureProfile.class")
    exclude("com/slabbed/util/SlabbedDebug.class")
    exclude("com/slabbed/util/SlabbedDebugBridge.class")
    exclude("com/slabbed/util/SlabbedAuditBridge.class")
    exclude("com/slabbed/util/TorchParticleTrace*.class")
    exclude("com/slabbed/mixin/BlockItemPlaceTraceMixin*.class")
    exclude("com/slabbed/mixin/client/ClientWorldParticleTraceMixin.class")
    exclude("slabbed.debug.mixins.json")
}

// configure the maven publication
publishing {
    publications {
        create("mavenJava", MavenPublication) {
            artifactId = project.archives_base_name
            from components.java
        }
    }

    // See https://docs.gradle.org/current/userguide/publishing_maven.html for information on how to set up publishing.
    repositories {
        // Add repositories to publish to here.
        // Notice: This block does NOT have the same function as the block in the top level.
        // The repositories here will be used for publishing your artifact, not for
        // fetching dependencies.
    }
}
